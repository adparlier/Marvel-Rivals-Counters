<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0e1a">
<title>Rivals Counter Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(1200px 600px at 80% -10%, #1b2347 0%, #0b0e1a 55%) #0b0e1a;
    color: #e9ecf5;
    font-family: 'Barlow', system-ui, sans-serif;
    padding: 20px 16px 48px;
  }
  button { font: inherit; }
  .shell { max-width: 880px; margin: 0 auto; }
  .brand {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700; font-size: 26px; letter-spacing: 0.12em;
    text-transform: uppercase; line-height: 1;
  }
  .brand em { font-style: normal; color: #FFB454; }
  .sub { color: #8b93ad; font-size: 13px; margin-top: 4px; }
  .mainTabs { display: flex; gap: 8px; margin: 18px 0 14px; }
  .mainTab {
    flex: 1; padding: 11px 0; cursor: pointer; border: 1px solid #2a3152;
    background: #11162b; color: #aab2cc;
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 16px;
    letter-spacing: 0.1em; text-transform: uppercase;
    clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
    transition: all .15s;
  }
  .mainTab.on { background: #FFB454; color: #14182b; border-color: #FFB454; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .pill {
    padding: 8px 14px; cursor: pointer; border: 1px solid #2a3152;
    background: #11162b; color: #aab2cc; border-radius: 999px;
    font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 14px;
    letter-spacing: 0.06em; text-transform: uppercase; transition: all .15s;
  }
  .pill small { opacity: .65; font-size: 11px; margin-left: 5px; }
  .pill.on { color: #0b0e1a; border-color: transparent; }
  .search {
    flex: 1; min-width: 150px; padding: 8px 14px; border-radius: 999px;
    border: 1px solid #2a3152; background: #0e1326; color: #e9ecf5;
    font-family: 'Barlow', sans-serif; font-size: 14px; outline: none;
  }
  .search::placeholder { color: #5d6685; }
  .grid {
    display: grid; gap: 8px;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  }
  .chip {
    display: flex; align-items: center; gap: 10px; padding: 9px 10px;
    background: #11162b; border: 1px solid #232a49; border-left-width: 3px;
    border-radius: 8px; cursor: pointer; text-align: left; color: #e9ecf5;
    transition: transform .1s, border-color .15s;
  }
  .chip:hover { transform: translateY(-1px); border-color: #3a4470; }
  .ava {
    width: 32px; height: 32px; flex: none; display: grid; place-items: center;
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 13px;
    color: #0b0e1a; clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
  }
  .chipName { font-size: 13.5px; font-weight: 600; line-height: 1.15; }
  .chipRole { font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase; }
  .back {
    background: none; border: none; color: #8b93ad; cursor: pointer;
    font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 14px;
    letter-spacing: .08em; text-transform: uppercase; padding: 0; margin-bottom: 14px;
  }
  .back:hover { color: #e9ecf5; }
  .heroHead {
    display: flex; align-items: center; gap: 14px; padding: 16px;
    background: #11162b; border: 1px solid #232a49; border-radius: 10px;
    margin-bottom: 18px;
  }
  .heroHead .ava { width: 46px; height: 46px; font-size: 18px; }
  .heroName {
    font-family: 'Rajdhani', sans-serif; font-weight: 700;
    font-size: 24px; letter-spacing: .05em; text-transform: uppercase; line-height: 1;
  }
  .pager {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .pagerLabel {
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px;
    letter-spacing: .12em; text-transform: uppercase; color: #8b93ad;
  }
  .pagerLabel b { color: #FFB454; }
  .navBtn {
    padding: 7px 18px; cursor: pointer; border: 1px solid #2a3152;
    background: #11162b; color: #e9ecf5; border-radius: 6px;
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px;
    letter-spacing: .1em; text-transform: uppercase; transition: all .15s;
  }
  .navBtn:hover:not(:disabled) { background: #FFB454; color: #0b0e1a; border-color: #FFB454; }
  .navBtn:disabled { opacity: .3; cursor: default; }
  .cards { display: grid; gap: 10px; grid-template-columns: repeat(3, 1fr); }
  .card {
    padding: 14px; border-radius: 10px; border: 1px solid #232a49;
    background: #11162b; border-top-width: 3px; cursor: pointer;
    text-align: left; color: #e9ecf5; transition: transform .1s, border-color .15s;
  }
  .card:hover { transform: translateY(-2px); }
  .card.dead { opacity: .4; cursor: default; }
  .cardRole {
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 11.5px;
    letter-spacing: .14em; text-transform: uppercase; margin-bottom: 8px;
  }
  .cardHero { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; }
  .cardName {
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 17px;
    letter-spacing: .04em; text-transform: uppercase; line-height: 1.05;
  }
  .why { font-size: 13px; line-height: 1.45; color: #aab2cc; }
  .hint { font-size: 11.5px; color: #5d6685; margin-top: 14px; }
  .empty {
    padding: 40px 20px; text-align: center; color: #8b93ad;
    background: #11162b; border: 1px dashed #2a3152; border-radius: 10px;
  }
  .empty h3 {
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 20px;
    letter-spacing: .1em; text-transform: uppercase; color: #e9ecf5; margin: 0 0 8px;
  }
  .empty p { margin: 0; font-size: 14px; }
  .flexBadge {
    font-size: 9px; font-weight: 700; letter-spacing: .1em; padding: 2px 5px;
    border-radius: 3px; background: rgba(255,180,84,.18); color: #FFB454;
    margin-left: 6px; vertical-align: 2px;
  }
  @media (max-width: 640px) {
    .cards { grid-template-columns: 1fr; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
  }
  @media (prefers-reduced-motion: reduce) {
    .chip, .card, .navBtn, .pill, .mainTab { transition: none; }
  }

/* ══════════ APP ══════════ */
const ROLE = {
  V: { label: "Vanguard", alt: "Tank", color: "#FFB454", dim: "rgba(255,180,84,0.14)" },
  D: { label: "Duelist", alt: "DPS", color: "#FF5470", dim: "rgba(255,84,112,0.14)" },
  S: { label: "Strategist", alt: "Healer", color: "#4ADEB8", dim: "rgba(74,222,184,0.14)" },
};

const state = { tab: "solo", roleFilter: "ALL", selected: null, page: 0, query: "" };

const heroRole = (name) => { const h = HEROES.find((x) => x.name === name); return h ? h.role : "D"; };

const initials = (name) => name
  .replace("The ", "")
  .split(/[\s&-]+/)
  .filter(Boolean)
  .slice(0, 2)
  .map((w) => w[0])
  .join("")
  .toUpperCase();

const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

const view = document.getElementById("view");
const tabSolo = document.getElementById("tabSolo");
const tabTeam = document.getElementById("tabTeam");

tabSolo.addEventListener("click", () => { state.tab = "solo"; render(); });
tabTeam.addEventListener("click", () => { state.tab = "team"; render(); });

function pick(name) { state.selected = name; state.page = 0; render(); window.scrollTo({ top: 0 }); }

function render() {
  tabSolo.classList.toggle("on", state.tab === "solo");
  tabTeam.classList.toggle("on", state.tab === "team");

  if (state.tab === "team") {
    view.innerHTML = `
      <div class="empty">
        <h3>Team counters — up next</h3>
        <p>This tab will let you tag the full enemy six and get a suggested counter-comp. Character counters came first.</p>
      </div>`;
    return;
  }

  if (state.selected) { renderDetail(); } else { renderGrid(); }
}

function renderGrid() {
  const q = state.query.trim().toLowerCase();
  const heroes = HEROES.filter((h) =>
    (state.roleFilter === "ALL" || h.role === state.roleFilter) &&
    (!q || h.name.toLowerCase().includes(q))
  );

  const pills = ["ALL", "V", "D", "S"].map((r) => {
    const on = state.roleFilter === r;
    const styleOn = on ? `style="background:${r === "ALL" ? "#e9ecf5" : ROLE[r].color}"` : "";
    const label = r === "ALL" ? "All" : `${ROLE[r].label}<small>${ROLE[r].alt}</small>`;
    return `<button class="pill ${on ? "on" : ""}" ${styleOn} data-role="${r}">${label}</button>`;
  }).join("");

  const chips = heroes.map((h) => `
    <button class="chip" style="border-left-color:${ROLE[h.role].color}" data-hero="${esc(h.name)}">
      <div class="ava" style="background:${ROLE[h.role].color}">${initials(h.name)}</div>
      <div>
        <div class="chipName">${esc(h.name)}${h.flex ? '<span class="flexBadge">FLEX</span>' : ""}</div>
        <div class="chipRole" style="color:${ROLE[h.role].color}">${ROLE[h.role].label}</div>
      </div>
    </button>`).join("");

  view.innerHTML = `
    <div class="toolbar">
      ${pills}
      <input class="search" id="search" placeholder="Search hero…" value="${esc(state.query)}">
    </div>
    <div class="grid">
      ${chips || `<div class="empty" style="grid-column:1/-1"><h3>No heroes match</h3><p>Try a shorter search or switch the role filter back to All.</p></div>`}
    </div>`;

  view.querySelectorAll(".pill").forEach((b) =>
    b.addEventListener("click", () => { state.roleFilter = b.dataset.role; render(); }));
  view.querySelectorAll(".chip").forEach((b) =>
    b.addEventListener("click", () => pick(b.dataset.hero)));
  const search = view.querySelector("#search");
  search.addEventListener("input", (e) => {
    state.query = e.target.value;
    const pos = e.target.selectionStart;
    render();
    const s2 = view.querySelector("#search");
    s2.focus(); s2.setSelectionRange(pos, pos);
  });
}

function renderDetail() {
  const name = state.selected;
  const role = heroRole(name);
  const data = COUNTERS[name];
  const maxPage = Math.max(data.V.length, data.D.length, data.S.length) - 1;
  state.page = Math.min(state.page, maxPage);

  const cards = ["V", "D", "S"].map((r) => {
    const entry = data[r][state.page];
    if (!entry) return `
      <div class="card dead" style="border-top-color:${ROLE[r].color}">
        <div class="cardRole" style="color:${ROLE[r].color}">${ROLE[r].label}</div>
        <div class="why">No more ranked counters in this role.</div>
      </div>`;
    const [cname, why] = entry;
    return `
      <button class="card" data-hero="${esc(cname)}" title="See counters for ${esc(cname)}"
        style="border-top-color:${ROLE[r].color};background:linear-gradient(180deg, ${ROLE[r].dim}, #11162b 55%)">
        <div class="cardRole" style="color:${ROLE[r].color}">${ROLE[r].label} pick</div>
        <div class="cardHero">
          <div class="ava" style="background:${ROLE[r].color}">${initials(cname)}</div>
          <div class="cardName">${esc(cname)}</div>
        </div>
        <div class="why">${esc(why)}</div>
      </button>`;
  }).join("");

  view.innerHTML = `
    <button class="back" id="back">← All heroes</button>
    <div class="heroHead" style="border-left:4px solid ${ROLE[role].color}">
      <div class="ava" style="background:${ROLE[role].color}">${initials(name)}</div>
      <div>
        <div class="heroName">${esc(name)}</div>
        <div class="chipRole" style="color:${ROLE[role].color}">${ROLE[role].label} · ${ROLE[role].alt}</div>
      </div>
    </div>
    <div class="pager">
      <button class="navBtn" id="prev" ${state.page === 0 ? "disabled" : ""}>← Prev</button>
      <div class="pagerLabel">Counter rank <b>#${state.page + 1}</b> of ${maxPage + 1}</div>
      <button class="navBtn" id="next" ${state.page >= maxPage ? "disabled" : ""}>Next →</button>
    </div>
    <div class="cards">${cards}</div>
    <div class="hint">Tip: tap any counter card to jump to that hero's own counters. Rankings blend community matchup data, counter guides, and live win-rate trackers — matchups shift each balance patch.</div>`;

  view.querySelector("#back").addEventListener("click", () => { state.selected = null; render(); });
  view.querySelector("#prev").addEventListener("click", () => { if (state.page > 0) { state.page--; render(); } });
  view.querySelector("#next").addEventListener("click", () => { if (state.page < maxPage) { state.page++; render(); } });
  view.querySelectorAll(".card[data-hero]").forEach((b) =>
    b.addEventListener("click", () => pick(b.dataset.hero)));
}

render();
</script>
</body>
</html>
